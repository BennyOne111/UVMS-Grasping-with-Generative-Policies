# B8' primary30 Diffusion Policy with active reaching action space only.
# Offline-only: actions are filtered to dx/dy/dz. No rollout and no gripper command.

seed: 83
device: "auto"

dataset:
  data_dir: "/home/benny/uuv_manipulator_ws/src/uvms/rexrov_single_oberon7_fm_dp/data/raw"
  split_file: "/home/benny/uuv_manipulator_ws/src/uvms/rexrov_single_oberon7_fm_dp/outputs/logs/b8_training_dataset_candidate_manifest/dataset_split_primary_30.json"
  obs_horizon: 4
  action_horizon: 8
  action_dim_indices: [0, 1, 2]
  stride: 1
  normalize: true
  include_progress: true
  observation_keys:
    - "base_pose"
    - "base_velocity"
    - "active_joint_positions"
    - "active_joint_velocities"
    - "gripper_state"
    - "target_pose"
  action_key: "action_ee_delta"
  require_action_available: true
  allow_fallback_dataset: false

model:
  num_diffusion_steps: 50
  beta_start: 0.0001
  beta_end: 0.02
  hidden_dims: [256, 256, 256]
  time_embed_dim: 64
  dropout: 0.0
  activation: "silu"
  prediction_type: "epsilon"

train:
  epochs: 10
  batch_size: 32
  lr: 0.001
  weight_decay: 0.000001
  grad_clip_norm: 1.0
  num_workers: 0
  log_interval: 10

eval:
  num_inference_steps: 50

outputs:
  run_name: "b8_primary30_diffusion_h8_xyz_smoke"
  checkpoint_dir: "/home/benny/uuv_manipulator_ws/src/uvms/rexrov_single_oberon7_fm_dp/outputs/checkpoints/b8_primary30_diffusion_h8_xyz_smoke"
  log_dir: "/home/benny/uuv_manipulator_ws/src/uvms/rexrov_single_oberon7_fm_dp/outputs/logs/b8_primary30_diffusion_h8_xyz_smoke"
  eval_dir: "/home/benny/uuv_manipulator_ws/src/uvms/rexrov_single_oberon7_fm_dp/outputs/eval/b8_primary30_diffusion_h8_xyz_smoke"
